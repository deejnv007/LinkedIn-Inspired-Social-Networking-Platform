apiVersion: apps/v1
kind: Deployment
metadata:
  name: post-service
spec:
  selector:
    matchLabels:
      app: post-service
  template:
    metadata:
      labels:
        app: post-service
    spec:
      containers:
      - name: post-service
        image: deejnv007/linkedin-app-post-service
        imagePullPolicy: Always
        resources:
          limits:
            memory: "400Mi"
            cpu: "200m"
          requests:
            memory: "200Mi"
            cpu: "100m"
        env:
          - name: SPRING_PROFILES_ACTIVE
            value: k8s
          - name: DB_USER
            value: root
          - name: DB_PASSWORD
            value: root
          - name: DB_SERVICE
            value: post-db
          - name: DB_NAME
            value: postsDB
          - name: SPRING_KAFKA_BOOTSTRAP_SERVERS
            value: kafka-0.kafka:9092,kafka-1.kafka:9092

        ports:
        - containerPort: 9095

---

apiVersion: v1
kind: Service
metadata:
  name: post-service
spec:
  selector:
    app: post-service
  ports:
  - port: 80
    targetPort: 9095



