apiVersion: apps/v1
kind: Deployment
metadata:
  name: notification-service
spec:
  selector:
    matchLabels:
      app: notification-service
  template:
    metadata:
      labels:
        app: notification-service
    spec:
      containers:
      - name: notification-service
        image: deejnv007/linkedin-app-notification-service
        imagePullPolicy: Always
        resources:
          limits:
            memory: "400Mi"
            cpu: "200m"
          requests:
            memory: "200Mi"
            cpu: "100m"
        env:
          - name: SPRING_PROFILES_ACTIVE
            value: k8s
          - name: DB_USER
            value: root
          - name: DB_PASSWORD
            value: root
          - name: DB_SERVICE
            value: notification-db
          - name: DB_NAME
            value: notificationsDB
          - name: SPRING_KAFKA_BOOTSTRAP_SERVERS
            value: kafka-0.kafka:9092,kafka-1.kafka:9092  
        ports:
        - containerPort: 9097

---

apiVersion: v1
kind: Service
metadata:
  name: notification-service
spec:
  selector:
    app: notification-service
  ports:
  - port: 80
    targetPort: 9097

  
