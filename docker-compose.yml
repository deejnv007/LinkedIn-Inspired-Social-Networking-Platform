services:
  kafka:
    image: apache/kafka:3.9.0
    container_name: kafka
    hostname: kafka
    ports:
      - "9092:9092"
    networks:
      - linkedin-network
    volumes:
      - kafka_data:/var/lib/kafka/data
    environment:
      KAFKA_NODE_ID: 0
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 0@kafka:9093

      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT

      CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk

  kafbat-ui:
    container_name: kafbat-ui
    image: ghcr.io/kafbat/kafka-ui:latest
    ports:
      - "8090:8080"
    depends_on:
      - kafka
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092
      KAFKA_CLUSTERS_0_KSQLDBSERVER: http://ksqldb0:8088
    networks:
      - linkedin-network


  notification-db:
    image: postgres
    container_name: notification-db
    environment:
      POSTGRES_DB: notificationsDB
      POSTGRES_USER: root
      POSTGRES_PASSWORD: root
    networks:
      - linkedin-network
    volumes:
      - notification-db-data:/var/lib/postgresql

  post-db:
    image: postgres
    container_name: post-db
    environment:
      POSTGRES_DB: postsDB
      POSTGRES_USER: root
      POSTGRES_PASSWORD: root
    networks:
      - linkedin-network
    volumes:
      - post-db-data:/var/lib/postgresql

  user-db:
    image: postgres
    container_name: user-db
    environment:
      POSTGRES_DB: usersDB
      POSTGRES_USER: root
      POSTGRES_PASSWORD: root
    networks:
      - linkedin-network
    volumes:
      - user-db-data:/var/lib/postgresql

  connection-db:
    image: neo4j
    container_name: connection-db
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      NEO4J_AUTH: neo4j/Abeysale@123
    networks:
      - linkedin-network
    volumes:
      - connection-db-data:/data

  discovery-server:
    image: deejnv007/linkedin-app-discovery-server
    container_name: discovery-server
    ports:
      - "8761:8761"
    networks:
      - linkedin-network

  post-service:
    image: deejnv007/linkedin-app-post-service
    container_name: post-service
    depends_on:
      - discovery-server
      - post-db
      - kafka
    networks:
      - linkedin-network

  user-service:
    image: deejnv007/linkedin-app-user-service
    container_name: user-service
    depends_on:
      - discovery-server
      - user-db
      - kafka
    networks:
      - linkedin-network

  notification-service:
    image: deejnv007/linkedin-app-notification-service
    container_name: notification-service
    depends_on:
      - discovery-server
      - notification-db
      - kafka
    networks:
      - linkedin-network

  connection-service:
    image: deejnv007/linkedin-app-connection-service
    container_name: connection-service
    depends_on:
      - discovery-server
      - connection-db
      - kafka
    networks:
      - linkedin-network

  api-gateway:
    image: deejnv007/linkedin-app-api-gateway
    container_name: api-gateway
    ports:
        - "8080:8080"
    depends_on:
      - discovery-server
    networks:
      - linkedin-network

networks:
  linkedin-network:

volumes:
  kafka_data:
  notification-db-data:
  post-db-data:
  user-db-data:
  connection-db-data: